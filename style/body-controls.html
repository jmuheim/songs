<div id="top-left-controls" class="controls-group">
  <a href="#/1" id="go-to-toc" class="ctrl"></a>
  <button id="toggle-chords-visibility" class="ctrl"></button>
</div>
<div id="top-right-controls" class="controls-group">
  <button id="show-qr" class="ctrl"></button>
  <button id="master-mode" class="ctrl"></button>
  <a href="#" id="toggle-theme" class="ctrl"></a>
</div>
<script>
  document.getElementById('toggle-chords-visibility').addEventListener('click', function() {
    document.body.classList.toggle('chords-hidden');
    this.blur();
  });

  (function() {
    function applyTheme(bright) {
      document.body.classList.toggle('theme-bright', bright);
    }

    applyTheme(localStorage.getItem('theme') === 'bright');

    document.getElementById('toggle-theme').addEventListener('click', function(e) {
      e.preventDefault();
      var bright = !document.body.classList.contains('theme-bright');
      applyTheme(bright);
      localStorage.setItem('theme', bright ? 'bright' : 'dark');
    });
  })();
</script>

<div id="master-modal" class="overlay-modal">
  <div class="modal-box">
    <p>Navigation übernehmen?</p>
    <div id="master-info">
      <p>Alle anderen werden dir folgen.</p>
    </div>
    <input type="password" id="master-pw" autocomplete="off">
    <div class="modal-buttons">
      <button id="master-cancel">Cancel</button>
      <button id="master-confirm">OK</button>
    </div>
  </div>
</div>

<div id="qr-modal" class="overlay-modal">
  <div class="modal-box">
    <p>Song Book öffnen</p>
    <p id="qr-info">Scanne den Code, um die Liedtexte auf deinem Gerät mitzuverfolgen.</p>
    <div id="qr-canvas"></div>
    <button id="qr-close">Schliessen</button>
  </div>
</div>

<script>
window.addEventListener('load', function() {
  var cfg = window.MULTIPLEX;
  if (!cfg || !window.io) return;

  var isMaster = false;
  var socket = io(cfg.url);

  socket.on(cfg.socketId, function(data) {
    if (!isMaster && data && data.state) Reveal.setState(data.state);
  });

  function broadcast() {
    socket.emit('multiplex-statechanged', {
      secret: cfg.secret,
      socketId: cfg.socketId,
      state: Reveal.getState()
    });
  }

  var REVEAL_EVENTS = ['slidechanged', 'fragmentshown', 'fragmenthidden', 'overviewshown', 'overviewhidden', 'paused', 'resumed'];

  function becomeMaster() {
    isMaster = true;
    document.getElementById('master-mode').classList.add('is-master');
    REVEAL_EVENTS.forEach(function(ev) { Reveal.on(ev, broadcast); });
    broadcast();
  }

  function becomeClient() {
    isMaster = false;
    document.getElementById('master-mode').classList.remove('is-master');
    REVEAL_EVENTS.forEach(function(ev) { Reveal.off(ev, broadcast); });
  }

  var masterBtn    = document.getElementById('master-mode');
  var masterModal  = document.getElementById('master-modal');
  var masterPw     = document.getElementById('master-pw');
  var qrModal      = document.getElementById('qr-modal');

  masterBtn.addEventListener('click', function() {
    if (isMaster) { becomeClient(); return; }
    masterModal.classList.add('visible');
    masterPw.focus();
  });

  masterModal.addEventListener('keydown', function(e) { e.stopPropagation(); });

  document.getElementById('master-cancel').addEventListener('click', function() {
    masterModal.classList.remove('visible');
    masterPw.value = '';
  });

  document.getElementById('master-confirm').addEventListener('click', function() {
    if (masterPw.value === cfg.password) {
      masterModal.classList.remove('visible');
      masterPw.value = '';
      becomeMaster();
    } else {
      masterPw.classList.add('shake');
      setTimeout(function() { masterPw.classList.remove('shake'); }, 500);
      masterPw.value = '';
      masterPw.focus();
    }
  });

  masterPw.addEventListener('keydown', function(e) {
    if (e.key === 'Enter')  document.getElementById('master-confirm').click();
    if (e.key === 'Escape') document.getElementById('master-cancel').click();
  });

  document.getElementById('show-qr').addEventListener('click', function() {
    if (!window.QRCode) return;
    var url = window.location.href.split('#')[0];
    var container = document.getElementById('qr-canvas');
    container.innerHTML = '';
    new QRCode(container, { text: url, width: 400, height: 400, colorDark: '#000000', colorLight: '#ffffff' });
    qrModal.classList.add('visible');
  });

  qrModal.addEventListener('keydown', function(e) { e.stopPropagation(); });

  document.getElementById('qr-close').addEventListener('click', function() {
    qrModal.classList.remove('visible');
  });

  [masterModal, qrModal].forEach(function(modal) {
    modal.addEventListener('click', function(e) {
      if (e.target === modal) modal.classList.remove('visible');
    });
  });
});
</script>
